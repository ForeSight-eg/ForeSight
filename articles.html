<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Articles — ForeSight</title>
<meta name="description" content="Insights on business analytics, executive control layers, and turning data into decisions." />
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="articles">
<div id="site-header"></div>

<section class="hero">
  <div class="container px-6 hero-inner">
    <h1>Insights for <span class="text-teal">decision-makers</span>.</h1>
    <p class="subtitle">Field notes, frameworks and points of view from our consultants and partners.</p>
  </div>
</section>

<section class="py-16">
  <div class="container px-6 grid grid-3" id="articles-grid"></div>
</section>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
  document.getElementById("articles-grid").innerHTML = ARTICLES.map(
    (a) => `<a href="article.html?slug=${a.slug}" class="card" style="display:flex; flex-direction:column; transition:all 0.2s;">
      <span class="tag-pill" style="width:fit-content;">${a.category}</span>
      <h3 class="mt-3" style="font-size:1.25rem; line-height:1.4;">${a.title}</h3>
      <p class="mt-3 muted" style="font-size:0.875rem; flex:1;">${a.excerpt}</p>
      <span class="mt-5" style="font-size:0.875rem; font-weight:600;">Read article →</span>
    </a>`
  ).join("");
</script>
</body>
</html>
