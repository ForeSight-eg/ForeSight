<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="page-title">Article — ForeSight</title>
<meta name="description" id="page-description" content="" />
<link rel="icon" href="assets/favicon.png" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="articles">
<div id="site-header"></div>

<article class="container px-6" style="max-width:48rem; padding-top:4rem; padding-bottom:4rem;" id="article-root">
  <p class="muted">Loading…</p>
</article>

<div id="site-footer"></div>

<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const slug = params.get("slug");
  const article = ARTICLES.find((a) => a.slug === slug);
  const root = document.getElementById("article-root");

  if (!article) {
    root.innerHTML = `<div class="text-center">
      <h1 style="font-size:1.875rem;">Article not found</h1>
      <a href="articles.html" class="mt-4" style="display:inline-block; color:var(--teal);">← Back to articles</a>
    </div>`;
  } else {
    document.getElementById("page-title").textContent = `${article.title} — ForeSight`;
    document.getElementById("page-description").setAttribute("content", article.excerpt);

    const body = article.body
      .map(
        (s) => `<div class="mt-8">
          ${s.heading ? `<h2>${s.heading}</h2>` : ""}
          ${s.paragraphs.map((p) => `<p>${p}</p>`).join("")}
        </div>`
      )
      .join("");

    root.innerHTML = `
      <a href="articles.html" style="font-size:0.875rem; font-weight:600; color:var(--teal);">← All articles</a>
      <span class="mt-6" style="display:block; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.1em; color:var(--teal);">${article.category}</span>
      <h1 class="mt-3" style="font-size:2.25rem; line-height:1.2;">${article.title}</h1>
      <p class="mt-4" style="font-size:1.125rem; color:var(--muted-foreground);">${article.excerpt}</p>
      <div class="prose mt-10">${body}</div>
      <div class="card text-center mt-10" style="background:var(--muted);">
        <h3 style="font-size:1.25rem;">Want to see this applied to your business?</h3>
        <a href="book-demo.html" class="btn-dark mt-5" style="display:inline-flex;">Book a 1-hour working session</a>
      </div>`;
  }
</script>
</body>
</html>
